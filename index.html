<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legalia AI</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

/* ===== VARIABLES ===== */
:root{
  --bg:#0e0c09;
  --text:#ffffff;
  --gold:#c9a84c;
  --gold-soft:rgba(201,168,76,0.2);
}

[data-theme="light"]{
  --bg:#f5f5f5;
  --text:#111;
  --gold:#c9a84c;
}

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* ===== NAV ===== */
nav{
  position:fixed;
  width:100%;
  top:0;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter:blur(10px);
  z-index:100;
}

/* LOGO */
.logo{
  height:40px;
}

/* BOTÓN TEMA */
.theme-toggle{
  cursor:pointer;
  padding:8px 16px;
  border-radius:20px;
  border:1px solid var(--gold-soft);
  color:var(--gold);
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  position:relative;
  overflow:hidden;
}

.hero-video{
  position:absolute;
  height:100%;
  transform:scale(1.2);
  margin-left:200px;
  opacity:.35;
}

.hero-overlay{
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 60% 50%, rgba(201,168,76,0.08), transparent 70%);
}

.hero-gradient{
  position:absolute;
  bottom:0;
  height:160px;
  width:100%;
  background:linear-gradient(to top,var(--bg),transparent);
}

.hero-content{
  position:relative;
  z-index:10;
  padding:0 40px;
  max-width:1200px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

/* BADGE */
.badge{
  border:1px solid var(--gold-soft);
  padding:6px 16px;
  border-radius:999px;
  color:var(--gold);
  font-size:.7rem;
  letter-spacing:.2em;
}

/* TITLE */
h1{
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(3rem,5vw,5rem);
  font-weight:300;
}

.gold{color:var(--gold);}
.italic{font-style:italic;}

/* TEXT */
p{
  max-width:500px;
  opacity:.8;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:16px;
}

.btn{
  padding:12px 22px;
  border-radius:999px;
  text-decoration:none;
}

.primary{
  background:var(--gold);
  color:black;
}

.secondary{
  border:1px solid var(--gold-soft);
  color:var(--gold);
}

/* ===== ANIMACIONES ===== */
.word{
  display:inline-block;
  opacity:0;
  transform:translateY(40px);
  animation:wordIn .6s forwards;
}

@keyframes wordIn{
  to{opacity:1;transform:translateY(0);}
}

.blur{
  opacity:0;
  transform:translateY(20px);
  animation:fade .6s forwards;
}

@keyframes fade{
  to{opacity:1;transform:translateY(0);}
}

/* ===== SECTION EXTRA ===== */
.section{
  padding:100px 40px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <!-- USA TU LOGO PNG SIN FONDO -->
  <img src="logo.png" class="logo">

  <button class="theme-toggle" onclick="toggleTheme()">
    Cambiar tema
  </button>
</nav>

<!-- HERO -->
<section class="hero">

<video class="hero-video" autoplay muted loop playsinline></video>

<div class="hero-overlay"></div>
<div class="hero-gradient"></div>

<div class="hero-content">

<div class="badge blur">✦ AI Legal Intelligence</div>

<h1>
<span class="word">Transforma</span>
<span class="word">tu</span>
<span class="word">firma</span>
<span class="word">con</span>
<span class="word gold">IA</span><br>

<span class="word">para</span>
<span class="word">tu</span>
<span class="word italic">negocio.</span>
</h1>

<p class="blur">
Automatiza procesos legales, analiza datos y toma decisiones estratégicas con precisión.
</p>

<div class="buttons blur">
<a href="#" class="btn primary">Agendar llamada →</a>
<a href="#" class="btn secondary">Conocer más</a>
</div>

</div>
</section>

<!-- SECCIÓN EXTRA (ejemplo para que no pierdas info futura) -->
<section class="section">
<h2>Sobre Legalia</h2>
<p>Aquí puedes seguir agregando TODO lo que ya tenías.</p>
</section>

<script>

/* ANIMACIÓN PALABRAS */
document.querySelectorAll(".word").forEach((w,i)=>{
  w.style.animationDelay=(i*0.08)+"s";
});

/* VIDEO HLS */
const video=document.querySelector(".hero-video");
if(Hls.isSupported()){
  const hls=new Hls();
  hls.loadSource("https://stream.mux.com/s8pMcOvMQXc4GD6AX4e1o01xFogFxipmuKltNfSYza0200.m3u8");
  hls.attachMedia(video);
}

/* MODO OSCURO / CLARO */
function toggleTheme(){
  const html=document.documentElement;
  const current=html.getAttribute("data-theme");
  html.setAttribute("data-theme", current==="dark"?"light":"dark");
}

</script>

</body>
</html>
