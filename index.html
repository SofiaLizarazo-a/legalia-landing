<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legalia AI</title>

  <!-- Fuente elegante -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- HLS video -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    /* ===== RESET ===== */
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter', sans-serif;
      background:#0e0c09;
      color:white;
    }

    :root{
      --gold:#c9a84c;
      --gold-border:rgba(201,168,76,0.3);
      --bg:#0e0c09;
      --white:#ffffff;
    }

    /* ===== NAVBAR SIMPLE ===== */
    nav{
      position:fixed;
      width:100%;
      top:0;
      left:0;
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      z-index:100;
      background:rgba(0,0,0,0.3);
      backdrop-filter:blur(10px);
    }

    nav h2{
      font-family:'Cormorant Garamond', serif;
      font-weight:400;
      letter-spacing:2px;
    }

    /* ===== HERO ===== */
    .hero{
      position:relative;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
    }

    .hero-video{
      position:absolute;
      z-index:0;
      height:100%;
      width:auto;
      object-fit:cover;
      transform:scale(1.2);
      transform-origin:left;
      margin-left:200px;
      opacity:0.35;
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 60% 50%, rgba(201,168,76,0.08), transparent 70%);
      z-index:5;
    }

    .hero-gradient{
      position:absolute;
      bottom:0;
      width:100%;
      height:160px;
      background:linear-gradient(to top,var(--bg),transparent);
      z-index:10;
    }

    .hero-inner{
      position:relative;
      z-index:20;
      max-width:1200px;
      padding:0 40px;
    }

    .hero-content{
      display:flex;
      flex-direction:column;
      gap:24px;
    }

    /* BADGE */
    .hero-badge{
      border:1px solid var(--gold-border);
      backdrop-filter:blur(10px);
      padding:6px 16px;
      border-radius:999px;
      font-size:.7rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--gold);
      width:fit-content;
    }

    /* TITLE */
    .hero-title{
      font-family:'Cormorant Garamond', serif;
      font-size:clamp(3rem,5vw,5rem);
      font-weight:300;
      line-height:1.1;
    }

    .hero-title .gold{
      color:var(--gold);
    }

    .italic{
      font-style:italic;
    }

    /* SUB */
    .hero-desc{
      color:rgba(255,255,255,0.75);
      font-size:18px;
      max-width:500px;
      line-height:1.6;
    }

    /* BUTTONS */
    .hero-actions{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .btn-primary{
      background:var(--gold);
      color:black;
      padding:12px 22px;
      border-radius:999px;
      text-decoration:none;
      font-weight:500;
    }

    .btn-outline{
      border:1px solid var(--gold-border);
      color:var(--gold);
      padding:12px 28px;
      border-radius:999px;
      background:transparent;
      cursor:pointer;
    }

    /* ===== ANIMATIONS ===== */
    .blur-in{
      opacity:0;
      transform:translateY(20px);
      filter:blur(10px);
      animation:blurIn 0.6s forwards;
    }

    .delay-1{ animation-delay:0.4s; }
    .delay-2{ animation-delay:0.6s; }

    @keyframes blurIn{
      to{
        opacity:1;
        transform:translateY(0);
        filter:blur(0);
      }
    }

    .word{
      display:inline-block;
      opacity:0;
      transform:translateY(40px);
      animation:wordIn 0.6s forwards;
    }

    @keyframes wordIn{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* ===== RESPONSIVE ===== */
    @media(max-width:768px){
      .hero-inner{
        padding:0 20px;
      }

      nav{
        padding:15px 20px;
      }
    }

  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <h2>Legalia</h2>
</nav>

<!-- HERO -->
<section class="hero">

  <video class="hero-video" autoplay muted loop playsinline></video>

  <div class="hero-overlay"></div>
  <div class="hero-gradient"></div>

  <div class="hero-inner">
    <div class="hero-content">

      <div class="hero-badge blur-in">
        ✦ AI Legal Intelligence
      </div>

      <h1 class="hero-title">
        <span class="word">Transforma</span>
        <span class="word">tu</span>
        <span class="word">firma</span>
        <span class="word">con</span>
        <span class="word gold">IA</span><br>

        <span class="word">para</span>
        <span class="word">tu</span>
        <span class="word italic">negocio.</span>
      </h1>

      <p class="hero-desc blur-in delay-1">
        Automatiza procesos legales, analiza datos críticos y toma decisiones estratégicas con precisión.
      </p>

      <div class="hero-actions blur-in delay-2">
        <a href="#" class="btn-primary">Agendar llamada →</a>
        <button class="btn-outline">Conocer más</button>
      </div>

    </div>
  </div>

</section>

<script>
  // animación palabras
  const words = document.querySelectorAll(".word");
  words.forEach((word, i) => {
    word.style.animationDelay = (i * 0.08) + "s";
  });

  // video HLS
  const video = document.querySelector(".hero-video");

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource("https://stream.mux.com/s8pMcOvMQXc4GD6AX4e1o01xFogFxipmuKltNfSYza0200.m3u8");
    hls.attachMedia(video);
  }
</script>

</body>
</html>
